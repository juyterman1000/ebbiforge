name: Build and Publish Ebbiforge Wheels

on:
  push:
    tags:
      - 'v*'           # trigger on tags like v4.0.1
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter
          # Only build cross-platform on Linux (handles musllinux + arm64)
          manylinux: auto
          # Point to the root-level pyproject.toml that references ebbiforge-core
          working-directory: .

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  # Build musl wheels (Alpine Linux / static linking)
  build-musl:
    name: Build musl wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build musl wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter
          manylinux: musllinux_1_2
          working-directory: .

      - name: Upload musl wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musl
          path: dist/

  # Build source distribution as fallback
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: .

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-musl, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ebbiforge/
    permissions:
      id-token: write   # Required for trusted publishing (no token needed!)

    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Uses PyPI Trusted Publishing (OIDC) - no PYPI_TOKEN secret needed
          # Just configure the trusted publisher on pypi.org for this repo
